<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WBS Viewer</title>
<style>
  :root{
    --day-w:22px; --row-h:30px; --header-h:48px;
    --border:#d7dbe0; --grid:#eceef1; --weekend:#f4f5f7;
    --text:#1f2430; --muted:#6b7280;
    --plan:#bcd0f7; --actual:#2f6fed; --pplan:#d9cdf5; --pactual:#7c3aed;
    --proj:#93acdf; --proj-line:#3a5694; --lvl0:#b9cdf2; --lvl1:#e3ebfb;
    --done-bg:#d4dae1; --done-fg:#5f6772; --accent:#2563eb; --edit-on:#16a34a;
    --plan-edge:#6f8fd0; --pspan:#5b78bd; --head-bg:#eef0f3;
    --plan-line:rgba(39,65,110,.55); --pplan-line:rgba(91,33,182,.55);  /* 予定枠の色: リーフ/親（半透明で枠を主張させない） */
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,"Segoe UI","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
       color:var(--text);background:#f7f8fa;display:flex;flex-direction:column;font-size:12px}
  #topbar{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:8px 12px;
          background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap}
  #topbar .title{font-weight:700;font-size:14px;margin-right:4px}
  #topbar button{font:inherit;padding:5px 10px;border:1px solid var(--border);background:#fff;border-radius:6px;cursor:pointer}
  #topbar button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  #openBtn.over{background:#eef4ff!important;border:1px dashed var(--accent)!important;color:var(--accent)!important} /* ドラッグ中だけ「落とせる」点線合図 */
  #stat{margin-left:auto;color:var(--muted);text-align:right;line-height:1.4}
  #stat b{color:var(--text)}
  #main{flex:1 1 auto;display:flex;min-height:0;background:#fff}
  #left{flex:0 0 auto;overflow-y:auto;overflow-x:hidden;border-right:2px solid var(--border)}
  #left::-webkit-scrollbar{display:none} #left{scrollbar-width:none}
  #right{flex:1 1 auto;overflow:auto;position:relative}
  .head{height:var(--header-h);position:sticky;top:0;z-index:4;background:var(--head-bg);border-bottom:2px solid var(--border)}
  #leftHead{display:flex}
  #leftHead .h{padding:4px 5px;border-right:1px solid var(--border);font-weight:600;
               display:flex;align-items:center;justify-content:center;height:var(--header-h);white-space:nowrap}
  #leftHead .hg{height:var(--header-h);border-right:1px solid var(--border);display:flex;flex-direction:column}
  #leftHead .hgt{height:50%;display:flex;align-items:center;justify-content:center;font-weight:600;
                 border-bottom:1px solid var(--border)}
  #leftHead .hgb{height:50%;display:flex}
  #leftHead .hsub{display:flex;align-items:center;justify-content:center;font-weight:600;
                  white-space:nowrap;border-right:1px solid var(--border)}
  #leftHead .hsub:last-child{border-right:none}
  #leftHead .h.h2l{flex-direction:column;line-height:1.25}
  #leftHead .h .unit{font-size:9px;color:var(--muted);margin-left:1px}
  .lrow{display:flex;height:var(--row-h);border-bottom:1px solid var(--grid)}
  .lrow .c{padding:0 5px;border-right:1px solid var(--grid);display:flex;align-items:center;
           overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .lrow .c.r{justify-content:flex-end;font-variant-numeric:tabular-nums}
  .lrow .c.num{justify-content:flex-end;color:var(--muted)}
  .lrow .c.note{color:var(--muted)}
  .lrow .c.note a{color:var(--accent)}
  .prow{background:var(--proj);font-weight:700;border-top:3px solid var(--proj-line);border-bottom:2px solid var(--proj-line)}
  .lvl0{background:var(--lvl0)} .lvl1{background:var(--lvl1)} .lvl2{background:#fff}
  .lrow.lvl0{font-weight:700} .lrow.lvl1{font-weight:600}
  .lrow.done{background:var(--done-bg);color:var(--done-fg)}
  .lrow.done .nm{text-decoration:line-through}
  .caret{display:inline-block;width:15px;color:#3b4654;user-select:none;text-align:center}
  .caret-sp{display:inline-block;width:15px}
  /* 編集モード */
  #editBtn.on{background:var(--edit-on);color:#fff;border-color:var(--edit-on)}
  #leftRows input{font:inherit;width:100%;min-width:0;box-sizing:border-box;border:1px solid #c3c9d2;
                  border-radius:4px;padding:1px 3px;background:#fff;color:var(--text)}
  #leftRows .c.r input{text-align:right}
  .nm-wrap{display:flex;align-items:center;gap:2px;width:100%;min-width:0;align-self:stretch}
  .nm-wrap .clk.caret{align-self:stretch;display:flex;align-items:center;justify-content:center;width:20px}  /* 編集時の折りたたみは caret のみ＝行高いっぱいにヒット領域を拡大 */
  #leftRows input.nm-in{flex:1 1 auto;width:auto}  /* #leftRows input{width:100%} のID詳細度に勝つためセレクタで上書き（!important回避） */
  .done-mark{color:var(--done-fg);flex:0 0 auto}
  .acts{display:inline-flex;gap:3px;flex:0 0 auto}
  .acts button{font:inherit;font-size:12px;line-height:1.3;padding:2px 6px;border:1px solid var(--border);
               background:#fff;border-radius:3px;cursor:pointer;color:#445}
  .acts button:hover{background:#eef2ff;border-color:#9db4f0}
  .acts button[data-act="del"]{margin-left:5px}   /* 破壊的操作の✕は少し離して誤クリック防止 */
  .date-wrap{display:flex;align-items:center;gap:2px;width:100%;min-width:0}
  #leftRows .date-wrap input[type="text"]{flex:1 1 auto;width:auto}  /* #leftRows input{width:100%} に勝つ詳細度（.nm-in と同じ理由） */
  .cal-proxy{position:absolute;width:0;height:0;opacity:0;border:0;padding:0;margin:0;pointer-events:none}
  .cal-btn{flex:0 0 auto;font-size:11px;line-height:1.2;padding:2px 3px;border:1px solid var(--border);
           background:#fff;border-radius:3px;cursor:pointer}
  .clk{cursor:pointer}
  #rightHead{position:sticky;top:0;z-index:4;background:var(--head-bg);border-bottom:2px solid var(--border)}
  #ym{display:flex;height:18px;border-bottom:1px solid var(--border)}
  #ym .seg{border-right:1px solid #c8ccd2;font-size:11px;color:var(--muted);white-space:nowrap;
           display:flex;align-items:center;justify-content:center;background:#e9ebef;overflow:hidden}
  #dates{display:flex;height:30px}
  #dates .d{width:var(--day-w);border-right:1px solid var(--grid);text-align:center;line-height:1.05;padding-top:3px;font-size:10px}
  #dates .d.sat{background:#eef3fb}#dates .d.sun{background:#fbeef0}
  #dates .d .dow{font-size:9px;color:var(--muted)}
  #dates .d.sat .dow{color:var(--accent)}#dates .d.sun .dow{color:#dc2626}
  #rightBody{position:relative}
  #ganttBg{position:absolute;top:0;left:0;z-index:0}
  #ganttBg .we{position:absolute;top:0;bottom:0;background:var(--weekend)}
  #ganttBg .mline{position:absolute;top:0;bottom:0;width:1px;background:#dfe2e6}
  #grows{position:relative;z-index:1}
  .grow{height:var(--row-h);border-bottom:1px solid var(--grid);position:relative}
  .grow.prow{background:var(--proj);border-top:3px solid var(--proj-line);border-bottom:2px solid var(--proj-line)}
  .grow.lvl0{background:var(--lvl0)} .grow.lvl1{background:var(--lvl1)}
  .grow.done{background:var(--done-bg)}
  .bar{position:absolute;border-radius:3px}
  /* 予定=半透明の実線枠のみ(前面)・実績=塗りバー(背面)を同一レーンに重ねる。実績の枠からのはみ出し/不足で予実差が見える */
  .bar.plan{top:5px;height:20px;background:transparent;border:2px solid var(--plan-line);border-radius:4px;z-index:2}
  .bar.actual{top:8px;height:14px;background:var(--actual);z-index:1}
  .grow.parent .bar.plan{border-color:var(--pplan-line)} .grow.parent .bar.actual{background:var(--pactual)}
  .grow.done .bar.actual{opacity:.55}
  .pspan{position:absolute;top:12px;height:6px;border-radius:3px;background:var(--pspan)}
  #overlay{position:absolute;top:0;left:0;z-index:2;pointer-events:none}
  #empty{padding:40px;color:var(--muted);text-align:center;width:100%}
  #notice{display:none;padding:6px 12px;background:#fff7d6;border-bottom:1px solid #e3d9a8;color:#6b5d1f;font-size:12px}
  #notice.show{display:block}
</style>
</head>
<body>
  <div id="topbar">
    <span class="title">WBS Viewer</span>
    <button id="openBtn" class="primary">ファイルを開く（D&amp;D可）</button>
    <button id="refreshBtn">更新</button>
    <button id="editBtn" title="インライン編集（自動保存）。ONにする時、書き込み許可のため保存ダイアログで wbs.json を選び直します">編集</button>
    <button id="langBtn" title="Switch language">EN</button>
    <input id="fallbackInput" type="file" accept=".json,application/json" hidden>
    <span id="stat">未読み込み</span>
  </div>
  <div id="notice"></div>
  <div id="main">
    <div id="empty">「ファイルを開く」または D&amp;D で <b>wbs.json</b> を読み込んでください（Chrome）。</div>
    <div id="left" style="display:none"><div id="leftHead" class="head"></div><div id="leftRows"></div></div>
    <div id="right" style="display:none"><div id="rightHead"></div><div id="rightBody"></div></div>
  </div>

<script>
"use strict";
(function(){
  const DAY_W=22, ROW_H=30, DAY_MS=86400000;
  const SAVE_DEBOUNCE_MS=400, RENDER_DEFER_MS=350, FOCUS_POLL_MS=400;  // 自動保存と遅延再描画の間隔
  // ===== i18n（UI文言の単一ソース。データ(wbs.json)は翻訳しない） =====
  const I18N={
    ja:{
      open:"ファイルを開く（D&D可）",reload:"更新",edit:"編集",langBtn:"EN",
      allTipExpand:"ツリーが全部展開されます ※Ctrl+Z でクリック前の状態に戻ります",
      allTipCollapse:"ツリーが全部折りたたまれます ※Ctrl+Z でクリック前の状態に戻ります",
      editTitle:"インライン編集（自動保存）。ONにする時、書き込み許可のため保存ダイアログで wbs.json を選び直します",
      notLoaded:"未読み込み",empty:"「ファイルを開く」または D&D で <b>wbs.json</b> を読み込んでください（Chrome）。",
      colNo:"No.",colTask:"作業項目",colQty:"数量",colHrs:"時間",colHrsUnit:"(h)",colWork:"工数",colWorkUnit:"(人日)",colWorkTip:"工数(人日) ＝ 数量 × 時間(h) ÷ 8h（所定労働時間）",colAsg:"担当",
      colStart:"開始",colEnd:"終了",colNote:"備考",grpPlan:"予定",grpActual:"実績",
      wd:["日","月","火","水","木","金","土"],locale:"ja-JP",active:"進行中",newTask:"新規作業",
      addTask:"＋タスク",addTaskTip:"タスクを追加",up:"上へ",down:"下へ",addBelow:"下に作業を追加",del:"削除",
      unsaved:"未保存の変更あり…",savedAt:"保存済 ",saveFail:"保存失敗",savePending:"未保存（外部変更のため保留）",
      calTip:"カレンダーから選択",
      ym:(y,m)=>`${y}年${m}月`,
      stat:(n,load,time,today)=>`${n}プロジェクト ／ 総工数 <b>${load}人日</b><br>読込: ${time}（本日 ${today}）`,
      confirmDel:name=>`「${name}」を削除します。よろしいですか？（配下も削除）`,
      fileLabel:(name,size)=>`${name}・${size} byte`,
      jsonFail:(label,msg)=>`JSON読み込み失敗${label?`（${label}）`:""}: ${msg}`,
      cantSave:"保存できません。『ファイルを開く』で開き直してください。",
      extChange:"wbs.json がツール外で変更されています。画面の内容で上書きしますか？\n（キャンセル後は「更新」で再読込できます）",
      saveErr:"保存に失敗: ",permDenied:"書き込み権限が許可されませんでした。",
      permUnavailable:"この環境では書き込み権限を取得できませんでした。",permErr:"書き込み権限を取得できませんでした: ",
      pickerGuide:"📂 保存ダイアログが開きます。いま開いている wbs.json をそのまま選んで「保存（置換）」してください（編集の書き込み許可のため・Chrome 再起動ごとに1回）。",
      pickerRetryCancel:"編集を有効にするには、もう一度「編集」を押してダイアログで wbs.json を選んでください。",
      pickerRetryGesture:"もう一度「編集」ボタンを押してください。保存ダイアログが開くので、いま開いている wbs.json を選んで「保存（置換）」してください。",
      diffFile:"選択されたファイルは現在開いているファイルと異なります。今後の保存先をそちらに切り替えますか？",
      truncWarn:"注意：いま選択したファイルは Chrome の仕様で空にされている可能性があります。中身を確認してください。",
      needHandle:"編集を保存するには、先に「ファイルを開く」か D&D で wbs.json を（ハンドル付きで）開いてください。",
      legacyConvert:"旧フォーマットのファイルです。編集を有効にすると新フォーマット（projects 配列）に変換して保存されます。続行しますか？",
      reloadErr:"更新失敗: ",loadFirst:"先に「ファイルを開く」または D&D で読み込んでください。",
      dropFail:"ドロップされたファイルを読み取れませんでした。「ファイルを開く」をお試しください。",
    },
    en:{
      open:"Open file (or drop)",reload:"Reload",edit:"Edit",langBtn:"日本語",
      allTipExpand:"Expands the whole tree (Ctrl+Z restores the view before the click)",
      allTipCollapse:"Collapses the whole tree (Ctrl+Z restores the view before the click)",
      editTitle:"Inline editing (autosave). When turning ON, re-select wbs.json in the save dialog to grant write permission",
      notLoaded:"No file loaded",empty:"Load <b>wbs.json</b> via \"Open file\" or drag &amp; drop (Chrome).",
      colNo:"No.",colTask:"Task",colQty:"Qty",colHrs:"Time",colHrsUnit:"(h)",colWork:"Effort",colWorkUnit:"(p-d)",colWorkTip:"Effort (person-days) = qty × time(h) ÷ 8h (standard working hours)",colAsg:"Owner",
      colStart:"Start",colEnd:"End",colNote:"Notes",grpPlan:"Plan",grpActual:"Actual",
      wd:["Su","Mo","Tu","We","Th","Fr","Sa"],locale:"en-US",active:"active",newTask:"New task",
      addTask:"+Task",addTaskTip:"Add a task",up:"Move up",down:"Move down",addBelow:"Add task below",del:"Delete",
      unsaved:"Unsaved changes…",savedAt:"Saved ",saveFail:"Save failed",savePending:"Not saved (external change)",
      calTip:"Pick a date",
      ym:(y,m)=>`${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][m-1]} ${y}`,
      stat:(n,load,time,today)=>`${n} project${n===1?"":"s"} / total <b>${load} person-days</b><br>Loaded: ${time} (today ${today})`,
      confirmDel:name=>`Delete "${name}"? (children will also be deleted)`,
      fileLabel:(name,size)=>`${name}, ${size} bytes`,
      jsonFail:(label,msg)=>`Failed to load JSON${label?` (${label})`:""}: ${msg}`,
      cantSave:'Cannot save. Re-open the file via "Open file".',
      extChange:"wbs.json was modified outside this tool. Overwrite it with the current view?\n(After cancel, press Reload to re-read.)",
      saveErr:"Save failed: ",permDenied:"Write permission was not granted.",
      permUnavailable:"Could not obtain write permission in this environment.",permErr:"Could not obtain write permission: ",
      pickerGuide:"📂 A save dialog will open. Select the currently open wbs.json and press Save (replace) — needed once per Chrome session to grant write permission.",
      pickerRetryCancel:'To enable editing, press "Edit" again and select wbs.json in the dialog.',
      pickerRetryGesture:'Press "Edit" once more — the save dialog will open; select the currently open wbs.json and press Save (replace).',
      diffFile:"The selected file differs from the currently open file. Switch future saves to it?",
      truncWarn:"Warning: the file you just selected may have been emptied by Chrome. Please check its contents.",
      needHandle:'To save edits, first open wbs.json via "Open file" or drag & drop (with a file handle).',
      legacyConvert:"This file uses the legacy format. Enabling edit will convert it to the projects[] format on save. Continue?",
      reloadErr:"Reload failed: ",loadFirst:'Load a file first via "Open file" or drag & drop.',
      dropFail:'Could not read the dropped file. Try "Open file" instead.',
    },
  };
  let lang="ja";try{if(localStorage.getItem("wbsLang")==="en")lang="en";}catch(_){}   // 既定は日本語・明示切替のみ記憶
  const t=k=>I18N[lang][k];
  const COLS=[
    {key:"no",label:"colNo",w:48,cls:"num"},
    {key:"name",label:"colTask",w:200,cls:"name"},
    {key:"qty",label:"colQty",w:40,cls:"r"},
    {key:"hrs",label:"colHrs",sub:"colHrsUnit",inline:true,w:50,cls:"r"},
    {key:"work",label:"colWork",sub:"colWorkUnit",tip:"colWorkTip",w:56,cls:"r"},
    {key:"asg",label:"colAsg",w:64,cls:""},
    {key:"ps",label:"colStart",group:"grpPlan",w:64,cls:""},
    {key:"pe",label:"colEnd",group:"grpPlan",w:64,cls:""},
    {key:"as",label:"colStart",group:"grpActual",w:64,cls:""},
    {key:"ae",label:"colEnd",group:"grpActual",w:64,cls:""},
    {key:"note",label:"colNote",w:200,cls:"note"},
  ];
  let fileHandle=null, lock=false, lastData=null, pendingCenter=true;
  let editMode=false, curProjects=null, refreshTimer=null;                 // 編集モード関連
  let dirty=false, saveTimer=null, saveChain=Promise.resolve(), fileMtime=0;  // 保存キュー（直列化＋外部変更検知）
  let pickerNeeded=false;   // file://等：権限APIが使えず保存ピッカー方式が必要（セッション中記憶）
  let saveMsg="";           // 保存状態の表示文言（未保存/保存済/保存失敗）
  const collapsed=new Set();   // 折りたたみ状態（キー）
  let collapseSnapshot=null;   // 全体caret実行前の折りたたみ状態（Ctrl+Zで復元・#52）

  const parse=s=>new Date(s+"T00:00:00Z");
  const diff=(a,b)=>Math.round((parse(b)-parse(a))/DAY_MS);
  const isDate=s=>typeof s==="string"&&/^(19|20)\d{2}-\d{2}-\d{2}$/.test(s)&&!isNaN(parse(s).getTime());  // 年は1900-2099（範囲外はゴミ入力扱い・ガント爆発防止）
  const addStr=(s,d)=>new Date(parse(s).getTime()+d*DAY_MS).toISOString().slice(0,10);
  const minStr=a=>{a=a.filter(Boolean);return a.length?a.slice().sort()[0]:null;};
  const maxStr=a=>{a=a.filter(Boolean);return a.length?a.slice().sort()[a.length-1]:null;};
  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  const mdSlash=s=>s?(parse(s).getUTCMonth()+1)+"/"+parse(s).getUTCDate():"";
  const fmtLoad=v=>{const r=Math.round(v*10)/10;return Number.isInteger(r)?String(r):r.toFixed(1);};
  const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
  // note内の http(s) URL のみリンク化（表示はURLのまま）。URL検出は生文字列・出力は全片esc()で
  // javascript:/HTML注入は構造的に不可（^https?:固定・<>はURLに含めない・テキスト片は全てエスケープ）
  const linkify=s=>String(s??"").split(/(https?:\/\/[^\s"<>]+)/g)
    .map((part,i)=>i%2?`<a href="${esc(part)}" target="_blank" rel="noopener noreferrer">${esc(part)}</a>`:esc(part))
    .join("");
  const todayStr=()=>{const n=new Date();return new Date(Date.UTC(n.getFullYear(),n.getMonth(),n.getDate())).toISOString().slice(0,10);};

  const isColor=s=>typeof s==="string"&&/^#[0-9a-fA-F]{3,8}$/.test(s);
  function normalizeProjects(d){
    if(!d||typeof d!=="object")return [];                         // null等の非オブジェクト→空
    if(Array.isArray(d.projects))return d.projects.filter(p=>p&&typeof p==="object");
    return [{name:d.project||"WBS",milestones:d.milestones||[],tasks:d.tasks||[]}];
  }
  function leavesOf(tasks){const out=[];(function c(ns){for(const n of ns){if(n._leaf)out.push(n);else c(n.children);}})(tasks||[]);return out;}
  function computeNode(n,TODAY){
    if(n.children&&n.children.length){
      const cs=n.children.map(c=>computeNode(c,TODAY));
      const load=cs.reduce((s,c)=>s+c.load,0);
      const progress=load?cs.reduce((s,c)=>s+c.progress*c.load,0)/load:0;
      const calc={load,progress,isLeaf:false,allDone:cs.every(c=>c.allDone),  // 全子が実完了
        planStart:minStr(cs.map(c=>c.planStart)),planEnd:maxStr(cs.map(c=>c.planEnd)),
        actualStart:minStr(cs.map(c=>c.actualStart)),actualEnd:maxStr(cs.map(c=>c.actualEnd)),
        actualEndEff:maxStr(cs.map(c=>c.actualEndEff))};
      n._calc=calc;n._leaf=false;return calc;
    }
    const p=n.plan||{},a=n.actual||{};
    const ps=isDate(p.start)?p.start:null, pe=isDate(p.end)?p.end:null;     // 不正日付は無視
    const as=isDate(a.start)?a.start:null, ae=isDate(a.end)?a.end:null;
    const load=(Number(n.qty)||0)*(Number(n.hours)||0)/8;
    let progress=0,actualEndEff=null;
    if(as){actualEndEff=ae||TODAY;
      if(ae)progress=100;
      else if(ps&&pe){let dur=diff(ps,pe);if(!(dur>=1))dur=1;progress=clamp(diff(as,TODAY)/dur*100,0,100);}
      else progress=0;}                                                      // plan欠損の進行中→0%（NaN回避）
    const calc={load,progress,isLeaf:true,allDone:!!ae,planStart:ps,planEnd:pe,  // 実績終了あり=完了
      actualStart:as,actualEnd:ae,actualEndEff};
    n._calc=calc;n._leaf=true;return calc;
  }

  function render(data){
    clearTimeout(refreshTimer);                                              // 保留中の遅延再描画を破棄（二重描画防止）
    const scrollKeep={left:document.getElementById("right").scrollLeft,
                      top:document.getElementById("right").scrollTop};   // スクロール位置を保持
    const TODAY=todayStr();
    const projects=normalizeProjects(data);
    curProjects=projects;                                                    // 編集ハンドラ用に保持
    const cw=c=>editMode&&DATE_FIELDS[c.key]?120:editMode&&c.key==="name"?c.w+40:c.w;  // 編集時は日付列と作業項目列を広げる
    const ms=[], rows=[];
    projects.forEach((proj,pi)=>{
      (proj.tasks||[]).forEach(n=>computeNode(n,TODAY));
      const lv=leavesOf(proj.tasks);
      const load=lv.reduce((s,n)=>s+n._calc.load,0);
      const prog=load?lv.reduce((s,n)=>s+n._calc.progress*n._calc.load,0)/load:0;
      const pkey="P|"+proj.name, pcol=collapsed.has(pkey);
      rows.push({kind:"proj",name:proj.name,pi,load,prog,key:pkey,collapsible:true,collapsed:pcol,terminal:pcol,
        planStart:minStr(lv.map(n=>n._calc.planStart)),planEnd:maxStr(lv.map(n=>n._calc.planEnd)),
        actualStart:minStr(lv.map(n=>n._calc.actualStart)),actualEnd:maxStr(lv.map(n=>n._calc.actualEnd)),
        allDone:lv.length>0&&lv.every(n=>n._calc.allDone)});                  // イナズマ線用（折りたたみ時の集約）
      (proj.milestones||[]).forEach(m=>ms.push(m));
      if(pcol)return;
      (function walk(ns,depth,prefix){for(let ci=0;ci<ns.length;ci++){const n=ns[ci];const path=prefix+"/"+ci;
        const hasCh=!!(n.children&&n.children.length), key="T|"+proj.name+"|"+n.id, col=hasCh&&collapsed.has(key);
        rows.push({kind:"task",node:n,depth,key,collapsible:hasCh,collapsed:col,terminal:!hasCh||col,path});
        if(hasCh&&!col)walk(n.children,depth+1,path);
      }})(proj.tasks||[],0,String(pi));
    });

    // レンジ
    const ds=[];
    rows.forEach(r=>{const c=r.kind==="task"?r.node._calc:r;
      [c.planStart,c.planEnd].forEach(d=>d&&ds.push(d));
      if(r.kind==="task"){[c.actualStart,c.actualEndEff].forEach(d=>d&&ds.push(d));}});
    ms.forEach(m=>isDate(m.date)&&ds.push(m.date)); ds.push(TODAY);
    const rangeStart=minStr(ds)||TODAY, rangeEnd=maxStr(ds)||TODAY;
    const totalDays=diff(rangeStart,rangeEnd)+1, ganttW=totalDays*DAY_W;
    const xOf=d=>diff(rangeStart,d)*DAY_W, centerOf=d=>xOf(d)+DAY_W/2, barW=(s,e)=>(diff(s,e)+1)*DAY_W;
    const xToday=centerOf(TODAY);

    const allLeaves=[]; projects.forEach(p=>allLeaves.push(...leavesOf(p.tasks)));
    const totalLoad=allLeaves.reduce((s,n)=>s+n._calc.load,0);

    let lh="";                                                   // グループ列（予定/実績）は2段見出し
    for(let i=0;i<COLS.length;i++){const c=COLS[i];
      if(c.group){let sub="",w=0,j=i;
        while(j<COLS.length&&COLS[j].group===c.group){sub+=`<div class="hsub" style="width:${cw(COLS[j])}px">${esc(t(COLS[j].label))}</div>`;w+=cw(COLS[j]);j++;}
        lh+=`<div class="hg" style="width:${w}px"><div class="hgt">${esc(t(c.group))}</div><div class="hgb">${sub}</div></div>`;
        i=j-1;
      }else if(c.key==="name"){                                            // 作業項目ヘッダに全体caret（#52）
        const anyCol=rows.some(r=>r.collapsed);
        lh+=`<div class="h" style="width:${cw(c)}px"><span id="allCaret" class="clk caret" title="${esc(t(anyCol?"allTipExpand":"allTipCollapse"))}">${anyCol?"▶":"▼"}</span>${esc(t(c.label))}</div>`;
      }else if(c.sub){                                                       // 単位付き見出し：短い単位は同一行・長い単位は2行（いずれも小さく薄く）。tipは計算式等のhover表示
        const tip=c.tip?` title="${esc(t(c.tip))}"`:"";
        lh+=c.inline
          ?`<div class="h" style="width:${cw(c)}px"${tip}><span>${esc(t(c.label))}<span class="unit">${esc(t(c.sub))}</span></span></div>`
          :`<div class="h h2l" style="width:${cw(c)}px"${tip}>${esc(t(c.label))}<span class="unit">${esc(t(c.sub))}</span></div>`;
      }else lh+=`<div class="h" style="width:${cw(c)}px">${esc(t(c.label))}</div>`;
    }
    let ym="",i=0;
    while(i<totalDays){const key=addStr(rangeStart,i).slice(0,7);let j=i;
      while(j<totalDays&&addStr(rangeStart,j).slice(0,7)===key)j++;
      ym+=`<div class="seg" style="width:${(j-i)*DAY_W}px">${t("ym")(key.slice(0,4),parseInt(key.slice(5,7),10))}</div>`;i=j;}
    let dc="";
    for(let k=0;k<totalDays;k++){const dsx=addStr(rangeStart,k),dow=parse(dsx).getUTCDay();
      const cls=dow===0?"sun":dow===6?"sat":"";
      dc+=`<div class="d ${cls}"><div>${parse(dsx).getUTCDate()}</div><div class="dow">${t("wd")[dow]}</div></div>`;}
    let bg="";
    for(let k=0;k<totalDays;k++){const dsx=addStr(rangeStart,k),dow=parse(dsx).getUTCDay();
      if(dow===0||dow===6)bg+=`<div class="we" style="left:${k*DAY_W}px;width:${DAY_W}px"></div>`;
      if(dsx.slice(8,10)==="01"&&k>0)bg+=`<div class="mline" style="left:${k*DAY_W}px"></div>`;}

    const sym=(r,tg)=>r.collapsible                                          // tg=true: caret自体をクリック可能に
      ?`<span class="${tg?"clk ":""}caret"${tg?` data-collapse="${esc(r.key)}"`:""}>${r.collapsed?"▶":"▼"}</span>`
      :`<span class="caret-sp"></span>`;

    let lrows="",grows="",pts=[[xToday,0]];
    rows.forEach((r,idx)=>{
      if(r.kind==="proj"){
        let info="";
        COLS.forEach(col=>{let v="";
          if(col.key==="no")v="◆";
          else if(col.key==="name"){
            if(editMode)v=`<span class="nm-wrap">${sym(r,true)}`
              +`<input class="nm-in" data-pname="${r.pi}" type="text" value="${esc(r.name)}" title="${esc(r.name)}">`
              +`<span class="acts"><button data-act="addtask" data-proj="${r.pi}" title="${esc(t("addTaskTip"))}">${esc(t("addTask"))}</button></span></span>`;
            else v=`<span class="clk" data-collapse="${esc(r.key)}">${sym(r)}<b>${esc(r.name)}</b></span>`;
          }
          else if(col.key==="work")v=esc(fmtLoad(r.load));
          else if(col.key==="ps")v=esc(mdSlash(r.planStart));
          else if(col.key==="pe")v=esc(mdSlash(r.planEnd));
          info+=`<div class="c ${col.cls}" style="width:${cw(col)}px">${v}</div>`;});
        lrows+=`<div class="lrow prow">${info}</div>`;
        const span=r.planStart&&r.planEnd?`<div class="pspan" style="left:${xOf(r.planStart)}px;width:${barW(r.planStart,r.planEnd)}px"></div>`:"";
        grows+=`<div class="grow prow">${span}</div>`;
      }else{
        const n=r.node,c=n._calc,leaf=n._leaf;
        const inProg=leaf&&c.actualStart&&!c.actualEnd, done=c.allDone;  // 完了=実績終了あり（集計は全子完了）
        let info="";
        COLS.forEach(col=>{let v="";
          switch(col.key){
            case"no":v=esc(n.id);break;
            case"name":{const body=`${sym(r)}${done?"✓ ":""}<span class="nm">${esc(n.name)}</span>`;
              v=r.collapsible
                ?`<span style="padding-left:${r.depth*15}px"><span class="clk" data-collapse="${esc(r.key)}">${body}</span></span>`
                :`<span style="padding-left:${r.depth*15}px">${body}</span>`;break;}
            case"qty":v=leaf?esc(n.qty):"";break;
            case"hrs":v=leaf?esc(n.hours):"";break;
            case"work":v=c.load?esc(fmtLoad(c.load)):"";break;
            case"asg":v=leaf?esc(n.assignee||""):"";break;
            case"ps":v=esc(mdSlash(c.planStart));break;
            case"pe":v=esc(mdSlash(c.planEnd));break;
            case"as":v=esc(c.actualStart?mdSlash(c.actualStart):"—");break;
            case"ae":v=esc(c.actualEnd?mdSlash(c.actualEnd):(inProg?t("active"):"—"));break;
            case"note":v=leaf?linkify(n.note||""):"";break;
          }
          if(editMode){
            const P=esc(r.path), inp=(f,val,type)=>type==="date"
              ?`<span class="date-wrap"><input data-path="${P}" data-field="${f}" type="text" placeholder="YYYY-MM-DD" value="${esc(val)}">`
                +`<input type="date" class="cal-proxy" tabindex="-1" aria-hidden="true">`
                +`<button type="button" class="cal-btn" data-cal title="${esc(t("calTip"))}">📅</button></span>`
              :`<input data-path="${P}" data-field="${f}" type="${type}"${type==="number"?' step="any"':""} value="${esc(val)}">`;
            if(col.key==="no")v=inp("id",n.id,"text");
            else if(col.key==="name"){
              const acts=`<span class="acts"><button data-act="up" data-path="${P}" title="${esc(t("up"))}">▲</button>`
                +`<button data-act="down" data-path="${P}" title="${esc(t("down"))}">▼</button>`
                +`<button data-act="add" data-path="${P}" title="${esc(t("addBelow"))}">＋</button>`
                +`<button data-act="del" data-path="${P}" title="${esc(t("del"))}">✕</button></span>`;
              v=`<span class="nm-wrap" style="padding-left:${r.depth*15}px">${sym(r,true)}${done?'<span class="done-mark">✓</span>':""}`
                +`<input class="nm-in" data-path="${P}" data-field="name" type="text" value="${esc(n.name)}" title="${esc(n.name)}">${acts}</span>`;
            }
            else if(leaf){
              if(col.key==="qty")v=inp("qty",n.qty,"number");
              else if(col.key==="hrs")v=inp("hours",n.hours,"number");
              else if(col.key==="asg")v=inp("assignee",n.assignee||"","text");
              else if(col.key==="ps")v=inp("ps",c.planStart||"","date");
              else if(col.key==="pe")v=inp("pe",c.planEnd||"","date");
              else if(col.key==="as")v=inp("as",c.actualStart||"","date");
              else if(col.key==="ae")v=inp("ae",c.actualEnd||"","date");
              else if(col.key==="note")v=inp("note",n.note||"","text");
            }
          }
          let tip="";
          if(col.key==="name"&&!editMode)tip=` title="${esc(n.name)}"`;
          else if(col.key==="note"&&leaf&&n.note&&!editMode)tip=` title="${esc(n.note)}"`;
          info+=`<div class="c ${col.cls}" style="width:${cw(col)}px"${tip}>${v}</div>`;});
        const lvl=`lvl${Math.min(r.depth,2)}`;
        lrows+=`<div class="lrow ${leaf?"leaf":"parent"} ${lvl} ${done?"done":""}">${info}</div>`;
        let bars="";
        if(c.planStart&&c.planEnd)bars+=`<div class="bar plan" style="left:${xOf(c.planStart)}px;width:${barW(c.planStart,c.planEnd)}px"></div>`;
        if(c.actualStart&&c.actualEndEff)bars+=`<div class="bar actual" style="left:${xOf(c.actualStart)}px;width:${barW(c.actualStart,c.actualEndEff)}px"></div>`;
        grows+=`<div class="grow ${leaf?"leaf":"parent"} ${lvl} ${done?"done":""}">${bars}</div>`;
      }
      // イナズマ点：terminal行（リーフ or 折りたたみ済ノード）。
      //   完了=本日線 / 未着手で予定開始超過=予定開始日(左,着手遅延) /
      //   期限超過で未完了=予定終了日(左,終了遅延) / 進行中(期限内)=本日線
      if(r.terminal){
        const c=r.kind==="task"?r.node._calc:r;
        let px=xToday;
        if(!c.allDone){
          if(c.actualStart&&c.planEnd&&TODAY>c.planEnd)px=centerOf(c.planEnd);              // 終了遅延：期限超過で未完了
          else if(!c.actualStart&&c.planStart&&TODAY>c.planStart)px=centerOf(c.planStart);  // 着手遅延：未着手で予定開始超過
          // 進行中（期限内）は本日線（着手ズレは表示しない）
        }
        pts.push([clamp(px,0,ganttW),idx*ROW_H+ROW_H/2]);
      }
    });
    const rowsH=rows.length*ROW_H;
    pts.push([xToday,rowsH]);

    let svg="";
    // CSS変数(var(--x))はSVGのプレゼンテーション属性では解決されない → stroke/fill はリテラル色を書く
    ms.forEach(m=>{if(!isDate(m.date)||m.date<rangeStart||m.date>rangeEnd)return;
      const x=centerOf(m.date),col=isColor(m.color)?m.color:"#a855f7";   // 色は#hexのみ許可（注入防止）
      const lbl=String(m.label??"");                                     // label欠損でも落とさない
      svg+=`<line x1="${x}" y1="0" x2="${x}" y2="${rowsH}" stroke="${col}" stroke-width="1.5" stroke-dasharray="4 3"></line>`
         +`<rect x="${x+2}" y="1" width="${Math.max(28,lbl.length*11)}" height="14" rx="2" fill="${col}"></rect>`
         +`<text x="${x+5}" y="12" font-size="10" fill="#fff">${esc(lbl)}</text>`;});
    svg+=`<polyline points="${pts.map(p=>p[0].toFixed(1)+","+p[1]).join(" ")}" fill="none" stroke="#e11d48" stroke-width="1.8" stroke-linejoin="round"></polyline>`;
    pts.slice(1,-1).forEach(p=>svg+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1]}" r="2.5" fill="#e11d48"></circle>`);

    document.getElementById("leftHead").innerHTML=lh;
    document.getElementById("leftRows").innerHTML=lrows;
    document.getElementById("left").style.width=COLS.reduce((s,c)=>s+cw(c),0)+"px";
    const rh=document.getElementById("rightHead"); rh.className="head"; rh.style.width=ganttW+"px";
    rh.innerHTML=`<div id="ym">${ym}</div><div id="dates">${dc}</div>`;
    const rb=document.getElementById("rightBody"); rb.style.width=ganttW+"px"; rb.style.height=rowsH+"px";
    rb.innerHTML=`<div id="ganttBg" style="width:${ganttW}px;height:${rowsH}px">${bg}</div>`
      +`<div id="grows">${grows}</div>`
      +`<svg id="overlay" width="${ganttW}" height="${rowsH}" viewBox="0 0 ${ganttW} ${rowsH}">${svg}</svg>`;
    document.getElementById("empty").style.display="none";
    document.getElementById("left").style.display="block";
    document.getElementById("right").style.display="block";
    document.getElementById("stat").innerHTML=
      t("stat")(projects.length,fmtLoad(totalLoad),new Date().toLocaleString(t("locale")),TODAY)
      +`<span id="saveMsg">${esc(saveMsg?" ／ "+saveMsg:"")}</span>`;
    const rEl=document.getElementById("right"), lEl=document.getElementById("left");
    const maxLeft=Math.max(0,ganttW-rEl.clientWidth);
    // 初回/新規読込のみ本日へセンタリング。折りたたみ・更新ではスクロール位置を保持
    rEl.scrollLeft=pendingCenter?clamp(xToday-rEl.clientWidth/2,0,maxLeft):Math.min(scrollKeep.left,maxLeft);
    rEl.scrollTop=scrollKeep.top; lEl.scrollTop=rEl.scrollTop;
    pendingCenter=false;
  }
  function applyData(data,isNew){
    lastData=data;
    if(isNew){collapsed.clear();collapseSnapshot=null;pendingCenter=true;exitEditMode();}   // 新規ファイルは折りたたみリセット＆センタリング＆編集OFF（#10）
    render(data);
  }
  function loadText(txt,isNew,label){try{applyData(JSON.parse(txt),isNew);}catch(e){alert(t("jsonFail")(label,e.message));}}
  function renderData(data){applyData(data,true);}      // 直接/テスト呼び出し＝新規扱い
  window.renderData=renderData;

  const left=document.getElementById("left"), right=document.getElementById("right");
  right.addEventListener("scroll",()=>{if(lock)return;lock=true;left.scrollTop=right.scrollTop;lock=false;});
  left.addEventListener("scroll",()=>{if(lock)return;lock=true;right.scrollTop=left.scrollTop;lock=false;});
  // 折りたたみ（イベント委譲）
  document.getElementById("leftRows").addEventListener("click",e=>{
    const t=e.target.closest("[data-collapse]"); if(!t)return;
    const k=t.getAttribute("data-collapse");
    collapsed.has(k)?collapsed.delete(k):collapsed.add(k);
    collapseSnapshot=null;   // 個別操作後の Ctrl+Z が古い状態へ巻き戻らないよう無効化（#52）
    if(lastData)render(lastData);
  });
  // 全体caret: ▶=全展開 / ▼=全たたみ。実行前の状態をスナップショットし Ctrl+Z で復元（#52）
  document.getElementById("leftHead").addEventListener("click",e=>{
    if(e.target.id!=="allCaret"||!lastData)return;
    collapseSnapshot=new Set(collapsed);
    if(collapsed.size)collapsed.clear();                                     // どこか閉じている → 全展開
    else normalizeProjects(lastData).forEach(p=>collapsed.add("P|"+p.name)); // 全部開いている → 全たたみ
    render(lastData);
  });
  window.addEventListener("keydown",e=>{
    if(!(e.ctrlKey||e.metaKey)||e.key!=="z"||collapseSnapshot===null)return;
    const a=document.activeElement;
    if(a&&a.tagName==="INPUT")return;                                        // テキストundoを妨げない（#36導入時に統合）
    e.preventDefault();
    collapsed.clear();collapseSnapshot.forEach(k=>collapsed.add(k));
    collapseSnapshot=null;
    if(lastData)render(lastData);
  });

  // ===== 編集モード（インライン編集・追加/削除/上下移動・自動保存） =====
  // 設計：変異は同期で行い即 render（DOMのdata-pathを常に最新に保つ）。保存はデバウンス＋単一チェーンで直列化。
  const DATE_FIELDS={ps:["plan","start"],pe:["plan","end"],as:["actual","start"],ae:["actual","end"]};
  const newLeaf=id=>({id,name:t("newTask"),qty:1,hours:8,assignee:"",plan:{start:null,end:null},actual:{start:null,end:null},note:""});
  const mintId=(arr,prefix)=>{const ids=new Set(arr.map(x=>String(x.id)));let nn=arr.length+1;while(ids.has(prefix+nn))nn++;return prefix+nn;};
  function resolvePath(path){
    const parts=path.split("/").map(Number), proj=curProjects&&curProjects[parts[0]];
    if(!proj)return {}; let arr=proj.tasks||[], node=null;
    for(let k=1;k<parts.length;k++){node=arr[parts[k]]; if(!node)return {proj}; if(k<parts.length-1)arr=node.children||[];}
    return {proj,parentArray:arr,index:parts[parts.length-1],node};
  }
  function applyField(n,f,val){
    if(f==="qty"||f==="hours")n[f]=val===""?0:(Number(val)||0);
    else if(DATE_FIELDS[f]){
      val=val.trim().replace(/\//g,"-");                                     // 2026/07/01 形式も受け付けて正規化
      if(val!==""&&!isDate(val))return;                                      // 入力途中・範囲外の日付は無視（ゴミを保存しない）
      const[grp,key]=DATE_FIELDS[f];
      if(!n[grp]||typeof n[grp]!=="object")n[grp]={}; n[grp][key]=val===""?null:val;
    }else n[f]=val;   // id, name, assignee, note
  }
  async function ensureWritable(){   // file:// では権限プロンプトが出せないため段階的にフォールバック（#17/#18/#19）
    try{
      if(fileHandle.queryPermission&&await fileHandle.queryPermission({mode:"readwrite"})==="granted")return true;
    }catch(_){}
    if(!pickerNeeded){                                                       // 2回目以降は前処理を全スキップ（ジェスチャー温存）
      try{
        if(fileHandle.requestPermission){
          const r=await fileHandle.requestPermission({mode:"readwrite"});
          if(r==="granted")return true;
          if(r==="denied"){alert(t("permDenied"));return false;}
        }
      }catch(_){pickerNeeded=true;}                                          // file:// は例外 → 以後ピッカー方式
      if(!pickerNeeded){
        try{
          const w=await fileHandle.createWritable({keepExistingData:true});  // 書込ストリームを開いて確認
          await w.abort();                                                   // 中身は変更しない（swapを破棄）
          return true;
        }catch(_){pickerNeeded=true;}
      }
    }
    // 保存ピッカーで選び直してもらう（選択自体が書き込み許可になる）。
    // 注意：ジェスチャー失効を防ぐため、ここまで alert 等のダイアログは一切挟まない（#19）。案内はページ内バーで出す（#30）
    if(!window.showSaveFilePicker){alert(t("permUnavailable"));return false;}
    notice(t("pickerGuide"));
    try{
      const f=await fileHandle.getFile();
      const h=await window.showSaveFilePicker({suggestedName:f.name,
        types:[{description:"JSON",accept:{"application/json":[".json"]}}]});
      try{
        if(fileHandle.isSameEntry&&!await h.isSameEntry(fileHandle)&&
           !confirm(t("diffFile"))){
          notice("");
          alert(t("truncWarn"));
          return false;
        }
      }catch(_){}
      fileHandle=h; fileMtime=0;                                             // 以後の保存先を書込可ハンドルに
      saveChain=saveChain.then(writeNow); await saveChain;                   // ピッカーの「置換」は選択時点でファイルを切り詰めるため、即書込して空のまま残さない（#29）
      notice("");
      return true;
    }catch(e){
      if(e&&e.name==="AbortError"){                                          // ユーザーキャンセル
        notice(t("pickerRetryCancel"));
        return false;
      }
      if(/user gesture/i.test(e&&e.message||""))                             // ジェスチャー失効 → 再クリックで最短経路
        notice(t("pickerRetryGesture"));
      else{notice("");alert(t("permErr")+e.message);}
      return false;
    }
  }
  // 保存キュー：dirty → デバウンス → 単一チェーンで書込（並走書込・古いスナップショット後勝ちを防ぐ）
  function setSaveMsg(m){saveMsg=m;const el=document.getElementById("saveMsg");if(el)el.textContent=m?" ／ "+m:"";}
  function notice(m){const el=document.getElementById("notice");el.textContent=m;el.classList.toggle("show",!!m);}  // ページ内の案内バー（alertと違いジェスチャーを消費しない）
  function queueSave(){dirty=true;setSaveMsg(t("unsaved"));clearTimeout(saveTimer);saveTimer=setTimeout(flushSaves,SAVE_DEBOUNCE_MS);}
  function flushSaves(){clearTimeout(saveTimer);if(dirty){dirty=false;saveChain=saveChain.then(writeNow);}return saveChain;}
  async function writeNow(){
    if(!fileHandle||!fileHandle.createWritable){setSaveMsg(t("saveFail"));alert(t("cantSave"));return;}
    try{
      const cur=await fileHandle.getFile();                                  // 外部変更（AI編集等）の検知
      if(fileMtime&&cur.lastModified!==fileMtime&&
         !confirm(t("extChange"))){
        setSaveMsg(t("savePending"));return;
      }
      const json=JSON.stringify(lastData,(k,v)=>(k==="_calc"||k==="_leaf")?undefined:v,2);  // 内部派生値のみ除外
      const w=await fileHandle.createWritable(); await w.write(json); await w.close();
      fileMtime=(await fileHandle.getFile()).lastModified;
      setSaveMsg(t("savedAt")+new Date().toLocaleTimeString(t("locale")));
    }catch(e){setSaveMsg(t("saveFail"));alert(t("saveErr")+e.message);}
  }
  function deferRender(){   // 入力にフォーカス中は再描画を遅らせ、フォーカス喪失を防ぐ
    clearTimeout(refreshTimer);
    refreshTimer=setTimeout(function tick(){
      const a=document.activeElement;
      if(a&&a.tagName==="INPUT"&&a.closest&&a.closest("#leftRows")){refreshTimer=setTimeout(tick,FOCUS_POLL_MS);return;}
      if(lastData)render(lastData);
    },RENDER_DEFER_MS);
  }
  function exitEditMode(){   // 新規ファイル読込時などに編集状態を確実に解除
    editMode=false;notice("");
    document.getElementById("editBtn").classList.remove("on");
    document.getElementById("leftRows").classList.remove("editing");
  }
  document.getElementById("editBtn").addEventListener("click",async()=>{
    if(!editMode){
      if(!fileHandle||!fileHandle.createWritable){alert(t("needHandle"));return;}
      if(!await ensureWritable())return;
      if(lastData&&!Array.isArray(lastData.projects)){                       // 旧フォーマット → 変換してから編集（#3）
        if(!confirm(t("legacyConvert")))return;
        lastData={projects:normalizeProjects(lastData)};
      }
      editMode=true;
    }else{flushSaves();editMode=false;}
    document.getElementById("editBtn").classList.toggle("on",editMode);
    document.getElementById("leftRows").classList.toggle("editing",editMode);
    if(lastData)render(lastData);
  });
  document.getElementById("leftRows").addEventListener("change",e=>{
    const t=e.target; if(t.tagName!=="INPUT")return;
    if(t.classList.contains("cal-proxy")){                                   // 📅の選択/クリアをテキスト入力へ反映（#33/#56）
      const txt=t.closest(".date-wrap").querySelector("input[data-field]");
      txt.value=t.value;                                                     // 空＝カレンダーの「クリア」もそのまま反映（→null保存）
      txt.dispatchEvent(new Event("change",{bubbles:true}));
      return;
    }
    if(t.hasAttribute("data-field")){
      const r=resolvePath(t.getAttribute("data-path")); if(!r.node)return;
      applyField(r.node,t.getAttribute("data-field"),t.value);
    }else if(t.hasAttribute("data-pname")){
      const pi=+t.getAttribute("data-pname"); if(!curProjects||!curProjects[pi])return;
      curProjects[pi].name=t.value;
    }else return;
    queueSave(); deferRender();
  });
  document.getElementById("leftRows").addEventListener("click",e=>{
    const cb=e.target.closest("button[data-cal]");                           // 📅 → ネイティブカレンダー（表示形式の制御不能を回避し、入力はISO固定 #33）
    if(cb){
      const w=cb.closest(".date-wrap"), txt=w.querySelector("input[data-field]"), px=w.querySelector(".cal-proxy");
      px.value=isDate(txt.value)?txt.value:"";
      try{px.showPicker();}catch(_){}
      return;
    }
    const b=e.target.closest("button[data-act]"); if(!b)return;
    const act=b.getAttribute("data-act");
    if(act==="addtask"){
      const pi=+b.getAttribute("data-proj"), proj=curProjects&&curProjects[pi]; if(!proj)return;
      proj.tasks=proj.tasks||[]; proj.tasks.push(newLeaf(mintId(proj.tasks,"")));
      collapsed.delete("P|"+proj.name);                                      // 折りたたみ中でも追加が見えるように展開（#11）
      queueSave(); render(lastData); return;
    }
    const r=resolvePath(b.getAttribute("data-path")), arr=r.parentArray, i=r.index;
    if(!arr||!r.node)return;
    if(act==="up"){if(i<=0)return; const t=arr[i-1];arr[i-1]=arr[i];arr[i]=t;}
    else if(act==="down"){if(i>=arr.length-1)return; const t=arr[i+1];arr[i+1]=arr[i];arr[i]=t;}
    else if(act==="del"){if(!confirm(t("confirmDel")(r.node.name||"")))return; arr.splice(i,1);}
    else if(act==="add"){
      const base=String(r.node.id||""), dot=base.lastIndexOf("."), prefix=dot>=0?base.slice(0,dot+1):"";
      arr.splice(i+1,0,newLeaf(mintId(arr,prefix)));
    }else return;
    queueSave(); render(lastData);                                           // 変異→即render（stale path防止 #5/#8）
  });
  document.getElementById("leftRows").addEventListener("wheel",e=>{
    const t=e.target; if(t.tagName==="INPUT"&&t.type==="number")t.blur();    // ホイールでの誤変更防止（#13）
  },{passive:true});
  window.addEventListener("beforeunload",e=>{
    if(!editMode)return;
    const a=document.activeElement;
    if(a&&a.tagName==="INPUT"&&a.closest&&a.closest("#leftRows"))a.blur();   // 未確定入力をコミット（changeが同期発火）
    if(dirty){flushSaves();e.preventDefault();}                              // 書込完了前の離脱に警告（#15）
  });

  async function loadFromHandle(h,isNew){
    const f=await h.getFile(), txt=await f.text();
    let data; try{data=JSON.parse(txt);}
    catch(e){alert(t("jsonFail")(t("fileLabel")(f.name,f.size),e.message));return;}  // 失敗時はハンドルを差し替えない（#1：別ファイル上書き破壊の防止）
    fileHandle=h; fileMtime=f.lastModified; applyData(data,isNew);
  }
  async function openPicker(){
    if(window.showOpenFilePicker){
      try{const[h]=await window.showOpenFilePicker({types:[{description:"JSON",accept:{"application/json":[".json"]}}]});await loadFromHandle(h,true);}
      catch(e){if(e&&e.name!=="AbortError")alert("読み込み失敗: "+e.message);}
    }else document.getElementById("fallbackInput").click();
  }
  async function refresh(){
    if(fileHandle){try{await flushSaves();await loadFromHandle(fileHandle,false);}catch(e){alert(t("reloadErr")+e.message);}}  // 保存を流してから再読込（#6）。折りたたみ/位置は維持
    else alert(t("loadFirst"));
  }
  document.getElementById("openBtn").addEventListener("click",openPicker);
  document.getElementById("refreshBtn").addEventListener("click",refresh);
  document.getElementById("fallbackInput").addEventListener("change",async e=>{
    const f=e.target.files[0];if(f){fileHandle=null;fileMtime=0;loadText(await f.text(),true,t("fileLabel")(f.name,f.size));}});
  const drop=document.getElementById("openBtn");   // 開くボタン自体がD&D受け口（クリック=ピッカー／ドロップ=読込）
  ["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("over");}));
  ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("over");}));
  document.addEventListener("dragover",e=>e.preventDefault());
  document.addEventListener("drop",e=>e.preventDefault());
  drop.addEventListener("drop",async e=>{
    const it=e.dataTransfer.items&&e.dataTransfer.items[0];
    const fb=e.dataTransfer.files[0]||null;       // await後はdataTransferが無効化され得るため同期的に確保
    if(it&&it.getAsFileSystemHandle){
      try{
        const h=await it.getAsFileSystemHandle();
        if(h&&h.kind==="file"){
          const f=await h.getFile();
          if(f.size>0||!fb||fb.size===0){await loadFromHandle(h,true);return;}  // ハンドル読みが空でフォールバックに中身がある時だけ切替
        }
      }catch(_){}
    }
    if(fb){fileHandle=null;fileMtime=0;loadText(await fb.text(),true,t("fileLabel")(fb.name,fb.size));}
    else alert(t("dropFail"));
  });

  // ===== 言語切替（既定:日本語。選択は localStorage に記憶） =====
  function applyLang(){
    document.documentElement.lang=lang;
    [["openBtn","open"],["refreshBtn","reload"],
     ["editBtn","edit"],["langBtn","langBtn"]].forEach(([id,k])=>{document.getElementById(id).textContent=t(k);});
    document.getElementById("editBtn").title=t("editTitle");
    document.getElementById("empty").innerHTML=t("empty");
    if(!lastData)document.getElementById("stat").textContent=t("notLoaded");
  }
  document.getElementById("langBtn").addEventListener("click",()=>{
    lang=lang==="ja"?"en":"ja";
    try{localStorage.setItem("wbsLang",lang);}catch(_){}
    applyLang(); if(lastData)render(lastData);
  });
  applyLang();
})();
</script>
